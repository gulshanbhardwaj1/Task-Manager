<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo/My Task Board</title>
<link rel="icon" type="image/png" href="mytaskbaar.png">

<link rel="preconnect" href ="https://fonts.googleapis .com">

<link rel="preconnect" href ="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts .googleapis.com/css?family =Orbitron:wght@400;7 ;900&family=Space+Grotesk :wght@400;500;700&display =swap" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3e;
    --text:     #e2e4f0;
    --muted:    #6b7199;
    --todo:     #7c6af7;
    --todo-bg:  #1e1b3a;
    --run:      #f5a623;
    --run-bg:   #2a2010;
    --done:     #3ecf8e;
    --done-bg:  #0d2a1e;
    --danger:   #ff5f6d;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 768px) {
    .board { grid-template-columns: 1fr; }
  }

  .column {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .col-header {
    padding: 1rem 1.2rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .col-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-title {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
  }

  .col-count {
    font-size: 0.78rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--border);
    color: var(--muted);
  }

  /* Column colours */
  .col-todo .col-dot   { background: var(--todo); }
  .col-todo .col-title { color: var(--todo); }
  .col-run  .col-dot   { background: var(--run); }
  .col-run  .col-title { color: var(--run); }
  .col-done .col-dot   { background: var(--done); }
  .col-done .col-title { color: var(--done); }

  .tasks {
    padding: 0.8rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 180px;
  }

  .task-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.85rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    cursor: default;
    transition: border-color 0.2s;
    position: relative;
  }

  .task-card:hover { border-color: var(--muted); }

  .task-text {
    flex: 1;
    font-size: 0.88rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .task-actions {
    display: flex;
    gap: 0.3rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .task-card:hover .task-actions { opacity: 1; }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 3px 5px;
    border-radius: 5px;
    transition: background 0.15s;
    color: var(--muted);
  }

  .btn-icon:hover { background: var(--border); color: var(--text); }
  .btn-icon.del:hover { color: var(--danger); }
  .btn-icon.fwd:hover { color: var(--todo); }

  .col-todo .btn-icon.fwd:hover { color: var(--run); }
  .col-run  .btn-icon.fwd:hover { color: var(--done); }
  .col-done .btn-icon.fwd { display: none; }

  .add-area {
    padding: 0.7rem 0.8rem 0.9rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
  }

  .add-area input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-area input:focus { border-color: var(--muted); }
  .add-area input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--border);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1rem;
    width: 34px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .col-todo .btn-add:hover { background: var(--todo); }
  .col-run  .btn-add:hover { background: var(--run); }
  .col-done .btn-add:hover { background: var(--done); }

  .empty-msg {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    padding: 1.5rem 0;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
  }
  
  
    /* Footer Matrix Styles */
    .glass-footer {
        width: 100%;
        padding: 30px 20px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        margin-top: 50px;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .glass-footer .social-links {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 15px;
    }

    .glass-footer .social-icon {
        color: #ffffff;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-decoration: none;
    }

    /* Dynamic Cyber Glow Interceptors */
    .glass-footer .social-icon:hover {
        transform: scale(1.15) translateY(-3px);
        color: var(--accent-glow);
        border-color: var(--accent-glow);
        box-shadow: 0 0 20px var(--accent-glow);
        background: rgba(255, 255, 255, 0.01);
    }

    .glass-footer .social-icon svg {
        width: 22px;
        height: 22px;
    }

    .glass-footer p {
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        margin: 0;
        letter-spacing: 0.5px;
    }

</style>
</head>
<body>

<header>
  <h1>My Task Baar</h1>
  <p>Keep your work in three sections, you will remember everything.</p>
</header>

<div class="board">
  <!-- TO DO -->
  <div class="column col-todo" id="col-todo">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">To Do</span>
      <span class="col-count" id="cnt-todo">0</span>
    </div>
    <div class="tasks" id="tasks-todo"></div>
    <div class="add-area">
    <input id="inp-todo" type="text" placeholder="Write your work to do..." />
      <button class="btn-add" onclick="addTask('todo')">+</button>
    </div>
  </div>

  <!-- IN RUNNING -->
  <div class="column col-run" id="col-run">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">In Progress</span>
      <span class="col-count" id="cnt-run">0</span>
    </div>
    <div class="tasks" id="tasks-run"></div>
    <div class="add-area">
<input id="inp-run" type="text" placeholder="Write work in progress…" />
      <button class="btn-add" onclick="addTask('run')">+</button>
    </div>
  </div>

  <!-- DONE -->
  <div class="column col-done" id="col-done">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">DONE</span>
      <span class="col-count" id="cnt-done">0</span>
    </div>
    <div class="tasks" id="tasks-done"></div>
    <div class="add-area">
      <input id="inp-done" type="text" placeholder="Write work is done…" />
      <button class="btn-add" onclick="addTask('done')">+</button>
    </div>
  </div>
</div>

<script>
  const COLS = ['todo', 'run', 'done'];
  const NEXT = { todo: 'run', run: 'done' };
  const FWD_LABEL = { todo: '▶', run: '✓' };

  let data = JSON.parse(localStorage.getItem('mkaam') || '{"todo":[],"run":[],"done":[]}');

  function save() {
    localStorage.setItem('mkaam', JSON.stringify(data));
  }

  function render() {
    COLS.forEach(col => {
      const container = document.getElementById('tasks-' + col);
      document.getElementById('cnt-' + col).textContent = data[col].length;

      if (data[col].length === 0) {
        container.innerHTML = '<div class="empty-msg">Nothing</div>';
        return;
      }

      container.innerHTML = data[col].map((task, i) => `
        <div class="task-card">
          <span class="task-text">${esc(task)}</span>
          <div class="task-actions">
            ${NEXT[col] ? `<button class="btn-icon fwd" title="Aage bhejo" onclick="moveTask('${col}',${i},'${NEXT[col]}')">${FWD_LABEL[col]}</button>` : ''}
            <button class="btn-icon del" title="Hatao" onclick="deleteTask('${col}',${i})">✕</button>
          </div>
        </div>
      `).join('');
    });
  }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask(col) {
    const inp = document.getElementById('inp-' + col);
    const val = inp.value.trim();
    if (!val) return;
    data[col].unshift(val);
    inp.value = '';
    save(); render();
  }

  function deleteTask(col, i) {
    data[col].splice(i, 1);
    save(); render();
  }

  function moveTask(from, i, to) {
    const [task] = data[from].splice(i, 1);
    data[to].unshift(task);
    save(); render();
  }

  // Enter key support
  COLS.forEach(col => {
    document.getElementById('inp-' + col).addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask(col);
    });
  });

  render();
</script>
